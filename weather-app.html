<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&family=Inter:wght@400;500;600&display=swap');

  :root{
    --sky-1:#E8F1F8;
    --sky-2:#CFE3F0;
    --ink:#1C2B36;
    --ink-soft:#52677A;
    --sun:#E8A33D;
    --sun-deep:#B97A1B;
    --rain:#3D7EA6;
    --card:#FFFFFF;
    --line:rgba(28,43,54,0.10);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family:'Inter',sans-serif;
    background:linear-gradient(180deg,var(--sky-1) 0%, var(--sky-2) 100%);
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:48px 20px;
  }
  .wrap{width:100%;max-width:460px;}
  h1{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:30px;
    letter-spacing:-0.01em;
    margin:0 0 4px;
  }
  .sub{
    color:var(--ink-soft);
    font-size:14px;
    margin:0 0 28px;
  }
  .search-row{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  input[type="text"]{
    flex:1;
    height:44px;
    border-radius:10px;
    border:1px solid var(--line);
    background:rgba(255,255,255,0.6);
    padding:0 14px;
    font-size:15px;
    font-family:'Inter',sans-serif;
    color:var(--ink);
    outline:none;
  }
  input[type="text"]:focus{border-color:var(--rain);}
  button{
    height:44px;
    padding:0 18px;
    border-radius:10px;
    border:none;
    background:var(--ink);
    color:#fff;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  button:hover{background:#0e1a22;}
  button:active{transform:scale(0.98);}

  .key-block{
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    margin-bottom:24px;
    font-size:13px;
    color:var(--ink-soft);
    background:rgba(255,255,255,0.45);
  }
  .key-block label{display:block;margin-bottom:6px;color:var(--ink);font-weight:500;}
  .key-block input{
    width:100%;height:36px;border-radius:8px;border:1px solid var(--line);
    padding:0 10px;font-size:13px;background:#fff;color:var(--ink);outline:none;
  }
  .key-block a{color:var(--rain);}

  .card{
    background:var(--card);
    border-radius:18px;
    padding:28px 26px;
    border:1px solid var(--line);
    display:none;
  }
  .card.show{display:block;}
  .city-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:18px;
  }
  .city{font-family:'Fraunces',serif;font-weight:500;font-size:22px;}
  .date{font-size:13px;color:var(--ink-soft);}

  .temp-row{
    display:flex;
    align-items:center;
    gap:18px;
    margin-bottom:22px;
  }
  .temp{
    font-family:'Fraunces',serif;
    font-size:64px;
    font-weight:500;
    line-height:1;
    color:var(--sun-deep);
  }
  .cond{
    font-size:15px;
    color:var(--ink-soft);
    text-transform:capitalize;
  }
  .feels{font-size:13px;color:var(--ink-soft);margin-top:2px;}

  .stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .stat{
    background:var(--sky-1);
    border-radius:12px;
    padding:12px 14px;
  }
  .stat-label{font-size:12px;color:var(--ink-soft);margin-bottom:4px;}
  .stat-value{font-size:18px;font-weight:500;}

  .msg{
    font-size:14px;
    color:var(--ink-soft);
    padding:10px 0;
    display:none;
  }
  .msg.show{display:block;}
  .msg.error{color:#a23c3c;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Weather</h1>
  <p class="sub">Search any city for current conditions.</p>

  <div class="key-block">
    <label for="apiKey">OpenWeather API key</label>
    <input type="text" id="apiKey" placeholder="Paste your API key" />
    <div style="margin-top:6px;">Free key at <a href="https://openweathermap.org/api" target="_blank">openweathermap.org/api</a>. Stored only in your browser.</div>
  </div>

  <div class="search-row">
    <input type="text" id="cityInput" placeholder="e.g. Tiruppur" />
    <button id="searchBtn">Search</button>
  </div>

  <p class="msg" id="msg"></p>

  <div class="card" id="card">
    <div class="city-row">
      <span class="city" id="cityName"></span>
      <span class="date" id="dateNow"></span>
    </div>
    <div class="temp-row">
      <span class="temp" id="temp"></span>
      <div>
        <div class="cond" id="cond"></div>
        <div class="feels" id="feels"></div>
      </div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="humidity"></div>
      </div>
      <div class="stat">
        <div class="stat-label">Wind speed</div>
        <div class="stat-value" id="wind"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const KEY_STORAGE = 'owm_api_key';
  const apiKeyInput = document.getElementById('apiKey');
  const cityInput = document.getElementById('cityInput');
  const searchBtn = document.getElementById('searchBtn');
  const card = document.getElementById('card');
  const msg = document.getElementById('msg');

  apiKeyInput.value = localStorage.getItem(KEY_STORAGE) || '';
  apiKeyInput.addEventListener('change', () => {
    localStorage.setItem(KEY_STORAGE, apiKeyInput.value.trim());
  });

  function showMessage(text, isError){
    msg.textContent = text;
    msg.classList.add('show');
    msg.classList.toggle('error', !!isError);
  }
  function clearMessage(){
    msg.classList.remove('show');
    msg.classList.remove('error');
  }

  async function fetchWeather(){
    const city = cityInput.value.trim();
    const key = apiKeyInput.value.trim();
    clearMessage();
    card.classList.remove('show');

    if(!key){
      showMessage('Enter your OpenWeather API key above first.', true);
      return;
    }
    if(!city){
      showMessage('Enter a city name to search.', true);
      return;
    }

    searchBtn.disabled = true;
    searchBtn.textContent = 'Loading...';

    try{
      const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&units=metric&appid=${key}`;
      const res = await fetch(url);
      const data = await res.json();

      if(!res.ok){
        showMessage(data.message ? `Couldn't find that city: ${data.message}` : 'Something went wrong. Try again.', true);
        return;
      }

      document.getElementById('cityName').textContent = `${data.name}, ${data.sys.country}`;
      document.getElementById('dateNow').textContent = new Date().toLocaleDateString(undefined, {weekday:'short', month:'short', day:'numeric'});
      document.getElementById('temp').textContent = `${Math.round(data.main.temp)}°C`;
      document.getElementById('cond').textContent = data.weather[0].description;
      document.getElementById('feels').textContent = `Feels like ${Math.round(data.main.feels_like)}°C`;
      document.getElementById('humidity').textContent = `${data.main.humidity}%`;
      document.getElementById('wind').textContent = `${data.wind.speed} m/s`;

      card.classList.add('show');
    }catch(err){
      showMessage('Network error. Check your connection and try again.', true);
    }finally{
      searchBtn.disabled = false;
      searchBtn.textContent = 'Search';
    }
  }

  searchBtn.addEventListener('click', fetchWeather);
  cityInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') fetchWeather(); });
</script>
</body>
</html>
